<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Forest</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0e1a12">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Forest">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root {
  --bg:          #0e1a12;
  --bg2:         #162018;
  --bg3:         #1e2d22;
  --surface:     #243329;
  --border:      #2e3f33;
  --text:        #d4e8d8;
  --text-muted:  #6b8f72;
  --text-dim:    #3d5442;
  --glow:        #f0a832;
  --glow-bg:     #2a2410;
  --glow-bdr:    #6b4f10;
  --dormant-bg:  #1a2420;
  --dormant-bdr: #263030;
  --dot-self:        #e05a4a;
  --dot-craft:       #9b72dd;
  --dot-learning:    #4a9de0;
  --dot-resources:   #4faa6a;
  --dot-environment: #2ec4a0;
  --tab-h: 56px;
  --header-h: 60px;
  --r: 14px;
  --r-sm: 8px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body { height: 100%; overflow: hidden; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  display: flex;
  flex-direction: column;
  max-width: 480px;
  margin: 0 auto;
}

/* ── HEADER ── */
.header {
  height: var(--header-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 18px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--bg);
  position: relative;
  z-index: 10;
}

.header-left { display: flex; align-items: center; gap: 10px; min-width: 52px; }

.back-btn {
  display: none;
  align-items: center;
  gap: 4px;
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 15px;
  cursor: pointer;
  font-family: inherit;
  padding: 4px 0;
}
.back-btn.visible { display: flex; }
.back-btn svg { width: 18px; height: 18px; }

.header-title {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 60%;
  text-align: center;
}

.header-right { min-width: 52px; display: flex; justify-content: flex-end; }

.edit-btn {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 13px;
  cursor: pointer;
  font-family: inherit;
  padding: 4px;
  display: none;
}
.edit-btn.visible { display: block; }

/* ── TABS ── */
.tabs {
  display: flex;
  height: var(--tab-h);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--bg);
}

.tab {
  flex: 1;
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 13px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  position: relative;
  transition: color 0.15s;
}

.tab.active { color: var(--glow); }

.tab::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 20%;
  right: 20%;
  height: 2px;
  background: var(--glow);
  border-radius: 1px 1px 0 0;
  opacity: 0;
  transition: opacity 0.15s;
}
.tab.active::after { opacity: 1; }

.tab-icon { font-size: 16px; }

/* ── CONTENT AREA ── */
.content {
  flex: 1;
  overflow: hidden;
  position: relative;
}

.tab-panel {
  display: none;
  height: 100%;
  flex-direction: column;
}
.tab-panel.active { display: flex; }

/* ── SEEDS TAB ── */
.scroll-area {
  flex: 1;
  overflow-y: auto;
  padding: 14px 16px 100px;
  -webkit-overflow-scrolling: touch;
}

.section-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-dim);
  padding: 10px 4px 6px;
}

/* seed card */
.seed-card {
  border-radius: var(--r);
  padding: 13px 15px;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
  margin-bottom: 9px;
  transition: transform 0.1s;
  position: relative;
}
.seed-card:active { transform: scale(0.975); }
.seed-card.active-seed  { background: var(--glow-bg);    border: 1px solid var(--glow-bdr); }
.seed-card.dormant-seed { background: var(--dormant-bg); border: 1px solid var(--dormant-bdr); }
.seed-card.completing   { animation: fadeout 0.5s ease forwards; }

@keyframes fadeout {
  0%   { opacity: 1; transform: scale(1); }
  60%  { opacity: 0.4; transform: scale(0.97); }
  100% { opacity: 0; transform: scale(0.94); }
}

.seed-row { display: flex; align-items: center; gap: 10px; }

.firefly {
  width: 9px; height: 9px;
  border-radius: 50%;
  flex-shrink: 0;
  transition: background 0.3s, box-shadow 0.3s;
}
.active-seed .firefly {
  background: var(--glow);
  box-shadow: 0 0 7px 2px rgba(240,168,50,0.45);
  animation: flicker 2.6s ease-in-out infinite;
}
.dormant-seed .firefly { background: var(--text-dim); }

@keyframes flicker {
  0%,100% { box-shadow: 0 0 7px 2px rgba(240,168,50,0.45); }
  50%      { box-shadow: 0 0 13px 4px rgba(240,168,50,0.2); }
}
@media (prefers-reduced-motion: reduce) { .active-seed .firefly { animation: none; } }

.seed-title {
  flex: 1;
  font-size: 15px;
  font-weight: 500;
  line-height: 1.3;
  color: var(--text);
}
.dormant-seed .seed-title { color: var(--text-muted); }

.seed-meta { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }

.root-dot { width: 7px; height: 7px; border-radius: 50%; opacity: 0.75; }

.children-hint { font-size: 11px; color: var(--text-dim); }

.seed-notes {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 7px;
  margin-left: 19px;
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.dormant-seed .seed-notes { color: var(--text-dim); }

/* progress seeds */
.progress-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 8px;
  margin-left: 19px;
}

.progress-track {
  flex: 1;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: var(--glow);
  border-radius: 2px;
  transition: width 0.3s ease;
}

.progress-label {
  font-size: 11px;
  color: var(--text-muted);
  white-space: nowrap;
  min-width: 52px;
  text-align: right;
}

.plus-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 50%;
  width: 26px; height: 26px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  color: var(--glow);
  font-size: 18px;
  line-height: 1;
  flex-shrink: 0;
  transition: background 0.12s;
}
.plus-btn:active { background: var(--glow-bg); }

/* tasks: completion check */
.check-btn {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: none;
  cursor: pointer;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.15s, background 0.15s;
}
.check-btn:active { border-color: var(--glow); background: var(--glow-bg); }
.check-btn svg { width: 12px; height: 12px; opacity: 0; transition: opacity 0.15s; }

/* ── PATHS TAB ── */
.paths-scroll {
  flex: 1;
  overflow-x: auto;
  overflow-y: hidden;
  display: flex;
  align-items: flex-start;
  padding: 20px 16px 100px;
  gap: 10px;
  -webkit-overflow-scrolling: touch;
  scroll-snap-type: x proximity;
}

.path-step {
  flex-shrink: 0;
  width: 180px;
  scroll-snap-align: start;
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
}

.path-card {
  border-radius: var(--r);
  padding: 14px 15px;
  position: relative;
  margin-bottom: 0;
}
.path-card.active-seed  { background: var(--glow-bg);    border: 1px solid var(--glow-bdr); }
.path-card.dormant-seed { background: var(--dormant-bg); border: 1px solid var(--dormant-bdr); }

.path-connector {
  display: flex;
  align-items: center;
  padding: 0 2px;
  color: var(--text-dim);
  font-size: 16px;
  align-self: center;
  flex-shrink: 0;
}

.path-goal {
  flex-shrink: 0;
  width: 180px;
  scroll-snap-align: start;
}

.goal-card {
  border-radius: var(--r);
  padding: 14px 15px;
  background: var(--bg3);
  border: 1px dashed var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}

.goal-flag { font-size: 18px; }

.goal-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-muted);
  line-height: 1.3;
}

.path-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  color: var(--text-dim);
  gap: 10px;
  font-size: 14px;
  text-align: center;
  padding: 40px;
}

/* ── PROJECTS TAB ── */
.projects-list {
  flex: 1;
  overflow-y: auto;
  padding: 14px 16px 100px;
  -webkit-overflow-scrolling: touch;
}

.project-card {
  border-radius: var(--r);
  padding: 16px;
  margin-bottom: 10px;
  cursor: pointer;
  background: var(--bg2);
  border: 1px solid var(--border);
  transition: border-color 0.15s;
}
.project-card:active { border-color: var(--text-dim); }

.project-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 6px;
}

.project-preview {
  font-size: 13px;
  color: var(--text-muted);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.project-meta {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 10px;
}

/* project editor full screen */
.project-editor {
  display: none;
  flex-direction: column;
  height: 100%;
  background: var(--bg);
}
.project-editor.open { display: flex; }

.editor-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px 18px 40px;
  -webkit-overflow-scrolling: touch;
}

.editor-title-input {
  width: 100%;
  background: none;
  border: none;
  color: var(--text);
  font-size: 22px;
  font-weight: 700;
  font-family: inherit;
  outline: none;
  margin-bottom: 16px;
  line-height: 1.3;
}
.editor-title-input::placeholder { color: var(--text-dim); }

.editor-divider {
  height: 1px;
  background: var(--border);
  margin-bottom: 16px;
}

.editor-text-input {
  width: 100%;
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 15px;
  font-family: inherit;
  outline: none;
  resize: none;
  line-height: 1.7;
  min-height: 300px;
}
.editor-text-input::placeholder { color: var(--text-dim); }

/* ── ADD BUTTON ── */
.add-btn {
  position: fixed;
  bottom: calc(env(safe-area-inset-bottom, 0px) + 24px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--glow);
  color: #1a1200;
  border: none;
  border-radius: 50px;
  padding: 13px 26px;
  font-size: 14px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 7px;
  box-shadow: 0 4px 20px rgba(240,168,50,0.28);
  transition: transform 0.12s, box-shadow 0.12s;
  z-index: 20;
  white-space: nowrap;
}
.add-btn:active {
  transform: translateX(-50%) scale(0.96);
  box-shadow: 0 2px 10px rgba(240,168,50,0.18);
}
.add-btn.hidden { display: none; }

/* ── SHEET ── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.55);
  z-index: 40;
  backdrop-filter: blur(2px);
}
.overlay.open { display: block; }

.sheet {
  display: none;
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  background: var(--bg2);
  border-radius: 20px 20px 0 0;
  border-top: 1px solid var(--border);
  padding: 14px 18px calc(env(safe-area-inset-bottom, 0px) + 32px);
  z-index: 41;
  max-height: 90vh;
  overflow-y: auto;
}
.sheet.open { display: block; }

.sheet-handle {
  width: 34px; height: 4px;
  background: var(--border);
  border-radius: 2px;
  margin: 0 auto 18px;
}

.sheet-title {
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 18px;
}

.field-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 6px;
}

.field-input {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  color: var(--text);
  font-size: 16px;
  font-family: inherit;
  padding: 11px 13px;
  outline: none;
  transition: border-color 0.15s;
  resize: none;
  margin-bottom: 14px;
}
.field-input:focus { border-color: var(--glow); }
.field-input::placeholder { color: var(--text-dim); }

.dot-selector {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 14px;
}

.dot-opt {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 5px 11px;
  border-radius: 50px;
  border: 1px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  font-size: 12px;
  color: var(--text-muted);
  transition: all 0.12s;
}
.dot-opt.sel { border-color: var(--glow); background: var(--glow-bg); color: var(--text); }
.dot-opt-circle { width: 7px; height: 7px; border-radius: 50%; }

.state-row { display: flex; gap: 8px; margin-bottom: 14px; }
.state-btn {
  flex: 1;
  padding: 10px;
  border-radius: var(--r-sm);
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text-muted);
  font-size: 13px;
  font-family: inherit;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  transition: all 0.12s;
}
.state-btn.s-active  { border-color: var(--glow-bdr);    background: var(--glow-bg);    color: var(--glow); }
.state-btn.s-dormant { border-color: var(--dormant-bdr); background: var(--dormant-bg); color: var(--text-muted); }

.state-dot { width: 8px; height: 8px; border-radius: 50%; }
.s-active  .state-dot { background: var(--glow); }
.s-dormant .state-dot { background: var(--text-dim); }

/* progress toggle in sheet */
.toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.toggle-label { font-size: 14px; color: var(--text-muted); }
.toggle {
  width: 44px; height: 26px;
  background: var(--border);
  border-radius: 13px;
  position: relative;
  cursor: pointer;
  transition: background 0.2s;
  border: none;
  flex-shrink: 0;
}
.toggle.on { background: var(--glow); }
.toggle::after {
  content: '';
  position: absolute;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: #fff;
  top: 3px; left: 3px;
  transition: transform 0.2s;
}
.toggle.on::after { transform: translateX(18px); }

.progress-fields {
  display: none;
  gap: 10px;
  margin-bottom: 14px;
}
.progress-fields.visible { display: flex; }
.progress-fields .field-input { margin-bottom: 0; flex: 1; }

.save-btn {
  width: 100%;
  background: var(--glow);
  color: #1a1200;
  border: none;
  border-radius: var(--r-sm);
  padding: 14px;
  font-size: 15px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  margin-top: 4px;
  transition: opacity 0.12s;
}
.save-btn:active { opacity: 0.8; }

.delete-btn {
  width: 100%;
  background: none;
  color: #e05a4a;
  border: 1px solid #3d1a16;
  border-radius: var(--r-sm);
  padding: 12px;
  font-size: 14px;
  font-family: inherit;
  cursor: pointer;
  margin-top: 8px;
  transition: background 0.12s;
}
.delete-btn:active { background: #1a0a08; }


/* path reorder */
.path-reorder {
  display: flex;
  justify-content: space-between;
  margin-top: 8px;
  gap: 6px;
}
.reorder-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text-muted);
  font-size: 14px;
  padding: 3px 10px;
  cursor: pointer;
  font-family: inherit;
  transition: background 0.12s;
}
.reorder-btn:active { background: var(--bg3); }

/* ── TASKS ── */
.task-card {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 13px 15px;
  border-radius: var(--r);
  margin-bottom: 9px;
  background: var(--dormant-bg);
  border: 1px solid var(--dormant-bdr);
  cursor: pointer;
  user-select: none;
  -webkit-user-select: none;
  transition: transform 0.1s;
}
.task-card:active { transform: scale(0.975); }
.task-card.task-active { background: var(--glow-bg); border-color: var(--glow-bdr); }

.task-check {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 1.5px solid var(--border);
  background: none;
  cursor: pointer;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.task-active .task-check { border-color: var(--glow); }
.task-check svg { width: 11px; height: 11px; stroke: var(--glow); opacity: 0; transition: opacity 0.15s; }

.task-title {
  flex: 1;
  font-size: 15px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.3;
}

.task-card.completing {
  animation: taskfade 0.55s ease forwards;
}
@keyframes taskfade {
  0%   { opacity: 1; transform: scale(1); }
  40%  { opacity: 0.6; }
  100% { opacity: 0; transform: scale(0.95) translateX(20px); }
}

/* empty */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-dim);
}
.empty-icon { font-size: 32px; margin-bottom: 10px; opacity: 0.4; }
.empty p { font-size: 14px; line-height: 1.6; }

/* hint */
.hint-bar {
  text-align: center;
  font-size: 11px;
  color: var(--text-dim);
  padding: 8px 16px 0;
  flex-shrink: 0;
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <button class="back-btn" id="backBtn" onclick="navigateUp()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </button>
  </div>
  <div class="header-title" id="headerTitle">Forest 🌿</div>
  <div class="header-right" style="display:flex;align-items:center;gap:6px;">
    <button class="edit-btn" id="editBtn" onclick="editCurrentSeed()">Edit</button>
    <button id="menuBtn" onclick="toggleMenu()" style="background:none;border:none;color:var(--text-muted);font-size:20px;cursor:pointer;padding:4px;line-height:1;">&#8943;</button>
  </div>
  <!-- overflow menu -->
  <div id="overflowMenu" style="display:none;position:absolute;top:60px;right:12px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-sm);z-index:50;min-width:160px;overflow:hidden;">
    <button onclick="exportData()" style="width:100%;text-align:left;background:none;border:none;color:var(--text);font-size:14px;font-family:inherit;padding:13px 16px;cursor:pointer;border-bottom:1px solid var(--border);">&#8599; Export Forest</button>
    <button onclick="document.getElementById('importInput').click()" style="width:100%;text-align:left;background:none;border:none;color:var(--text);font-size:14px;font-family:inherit;padding:13px 16px;cursor:pointer;">&#8601; Import Forest</button>
  </div>
  <input type="file" id="importInput" accept=".json" style="display:none" onchange="importData(event)">
</div>

<!-- TABS -->
<div class="tabs" id="tabs">
  <button class="tab active" data-tab="seeds" onclick="switchTab('seeds')">
    <span class="tab-icon">🌱</span>Seeds
  </button>
  <button class="tab" data-tab="tasks" onclick="switchTab('tasks')">
    <span class="tab-icon">✓</span>Tasks
  </button>
  <button class="tab" data-tab="paths" onclick="switchTab('paths')">
    <span class="tab-icon">🛤️</span>Paths
  </button>
  <button class="tab" data-tab="projects" onclick="switchTab('projects')">
    <span class="tab-icon">📖</span>Projects
  </button>
</div>

<!-- CONTENT -->
<div class="content">

  <!-- SEEDS PANEL -->
  <div class="tab-panel active" id="panel-seeds">
    <div class="hint-bar" id="seedsHint">Double-tap to open · Hold to toggle firefly</div>
    <div class="scroll-area" id="seedList"></div>
  </div>

  <!-- TASKS PANEL -->
  <div class="tab-panel" id="panel-tasks">
    <div class="hint-bar" id="tasksHint">Tap to complete · Hold to edit</div>
    <div class="scroll-area" id="taskList"></div>
  </div>

  <!-- PATHS PANEL -->
  <div class="tab-panel" id="panel-paths">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;flex-shrink:0;">
      <span style="font-size:11px;color:var(--text-dim)">Hold a step to edit</span>
      <button onclick="openGoalSheet()" style="background:none;border:1px solid var(--border);border-radius:50px;color:var(--text-muted);font-size:11px;padding:4px 10px;cursor:pointer;font-family:inherit;">&#127919; Set goal</button>
    </div>
    <div class="paths-scroll" id="pathsList"></div>
  </div>

  <!-- PROJECTS PANEL -->
  <div class="tab-panel" id="panel-projects">
    <div class="projects-list" id="projectsList"></div>
    <!-- inline project editor -->
    <div class="project-editor" id="projectEditor">
      <div class="editor-body">
        <input class="editor-title-input" id="editorTitle" placeholder="Project title" type="text">
        <div class="editor-divider"></div>
        <textarea class="editor-text-input" id="editorBody" placeholder="Think it through…" rows="20"></textarea>
      </div>
    </div>
  </div>

</div>

<!-- ADD BUTTON -->
<button class="add-btn" id="addBtn" onclick="openSheet()">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  New seed
</button>

<!-- OVERLAY + SHEET -->
<div class="overlay" id="overlay" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-title" id="sheetTitle">Plant a seed</div>

  <div class="field-label">Title</div>
  <input class="field-input" id="titleInput" type="text" placeholder="A few words…" maxlength="80" autocomplete="off">

  <div id="notesSection">
    <div class="field-label">Notes</div>
    <textarea class="field-input" id="notesInput" rows="3" placeholder="Expand when ready…"></textarea>
  </div>

  <div id="rootSection">
    <div class="field-label">Root</div>
    <div class="dot-selector" id="dotSelector">
      <div class="dot-opt sel" data-root="none" onclick="selectRoot(this)"><div class="dot-opt-circle" style="background:var(--text-dim)"></div>None</div>
      <div class="dot-opt" data-root="self" onclick="selectRoot(this)"><div class="dot-opt-circle" style="background:var(--dot-self)"></div>Self</div>
      <div class="dot-opt" data-root="craft" onclick="selectRoot(this)"><div class="dot-opt-circle" style="background:var(--dot-craft)"></div>Craft</div>
      <div class="dot-opt" data-root="learning" onclick="selectRoot(this)"><div class="dot-opt-circle" style="background:var(--dot-learning)"></div>Learning</div>
      <div class="dot-opt" data-root="resources" onclick="selectRoot(this)"><div class="dot-opt-circle" style="background:var(--dot-resources)"></div>Resources</div>
      <div class="dot-opt" data-root="environment" onclick="selectRoot(this)"><div class="dot-opt-circle" style="background:var(--dot-environment)"></div>Environment</div>
    </div>
  </div>

  <div class="field-label">State</div>
  <div class="state-row">
    <button class="state-btn s-active" id="stateActive" onclick="selectState('active')"><div class="state-dot"></div>Active</button>
    <button class="state-btn" id="stateDormant" onclick="selectState('dormant')"><div class="state-dot"></div>Dormant</button>
  </div>

  <div id="progressSection">
    <div class="toggle-row">
      <span class="toggle-label">Progress counter</span>
      <button class="toggle" id="progressToggle" onclick="toggleProgress()"></button>
    </div>
    <div class="progress-fields" id="progressFields">
      <input class="field-input" id="progressCurrent" type="number" min="0" placeholder="0" style="text-align:center;">
      <input class="field-input" id="progressTarget" type="number" min="1" placeholder="40" style="text-align:center;">
      <input class="field-input" id="progressUnit" type="text" placeholder="hrs" maxlength="8" style="text-align:center;">
    </div>
  </div>

  <button class="save-btn" onclick="saveSeed()">Plant it</button>
  <button class="delete-btn" id="deleteBtn" onclick="deleteSeed()" style="display:none">Remove seed</button>
</div>

<script>
// ── STATE ──
const ROOT_COLORS = {
  none:'var(--text-dim)', self:'var(--dot-self)', craft:'var(--dot-craft)',
  learning:'var(--dot-learning)', resources:'var(--dot-resources)', environment:'var(--dot-environment)'
};

let db = JSON.parse(localStorage.getItem('forest_v2') || '{"seeds":[],"tasks":[],"paths":[],"projects":[]}');
if (!db.tasks) db.tasks = [];
let currentTab = 'seeds';
let navStack = [];
let currentParentId = null;
let editingId = null;
let editingType = null;
let selRoot = 'none';
let selState = 'active';
let progressOn = false;
let currentProjectId = null;
let projectSaveTimer = null;

function persist() { localStorage.setItem('forest_v2', JSON.stringify(db)); }

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── TAB SWITCHING ──
function switchTab(tab) {
  if (currentTab === 'projects' && currentProjectId) saveProjectEditor();
  if (currentTab === 'tasks') { /* no state to clear */ }
  currentTab = tab;
  currentParentId = null;
  navStack = [];
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + tab));
  document.getElementById('tabs').style.display = '';
  document.getElementById('projectEditor').classList.remove('open');
  currentProjectId = null;
  updateHeader();
  render();
}

// ── HEADER ──
function updateHeader() {
  const backBtn = document.getElementById('backBtn');
  const editBtn = document.getElementById('editBtn');
  const title = document.getElementById('headerTitle');
  const hint = document.getElementById('seedsHint');
  const addBtn = document.getElementById('addBtn');

  if (currentTab === 'projects' && currentProjectId) {
    backBtn.classList.add('visible');
    editBtn.classList.remove('visible');
    title.textContent = '';
    addBtn.classList.add('hidden');
    return;
  }

  addBtn.classList.remove('hidden');

  if (currentParentId && currentTab === 'seeds') {
    const s = db.seeds.find(x => x.id === currentParentId);
    backBtn.classList.add('visible');
    editBtn.classList.add('visible');
    title.textContent = s?.title || '';
    if (hint) hint.style.display = 'none';
  } else {
    backBtn.classList.remove('visible');
    editBtn.classList.remove('visible');
    const labels = { seeds: 'Forest 🌿', tasks: 'Tasks ✓', paths: 'Paths 🛤️', projects: 'Projects 📖' };
    title.innerHTML = labels[currentTab] || 'Forest 🌿';
    if (hint) hint.style.display = '';
  }

  const btnLabels = { seeds: 'New seed', tasks: 'New task', paths: 'New step', projects: 'New project' };
  addBtn.childNodes[addBtn.childNodes.length-1].textContent = ' ' + btnLabels[currentTab];
}

// ── RENDER ──
function render() {
  if (currentTab === 'seeds') renderSeeds();
  else if (currentTab === 'tasks') renderTasks();
  else if (currentTab === 'paths') renderPaths();
  else if (currentTab === 'projects') renderProjects();
  updateHeader();
}

// SEEDS
function renderSeeds() {
  const list = document.getElementById('seedList');
  const children = db.seeds.filter(s => s.parentId === currentParentId);
  if (!children.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">🌱</div><p>No seeds here yet.<br>Plant the first one.</p></div>`;
    return;
  }
  const active = children.filter(s => s.state === 'active');
  const dormant = children.filter(s => s.state !== 'active');
  let html = '';
  if (active.length && !currentParentId) html += `<div class="section-label">Active</div>`;
  active.forEach(s => html += seedCardHTML(s));
  if (dormant.length && !currentParentId) html += `<div class="section-label">Resting</div>`;
  dormant.forEach(s => html += seedCardHTML(s));
  list.innerHTML = html;
  attachSeedGestures();
}

function seedCardHTML(s) {
  const kids = db.seeds.filter(x => x.parentId === s.id).length;
  const dot = ROOT_COLORS[s.root] || ROOT_COLORS.none;
  const pct = s.progress ? Math.min(100, Math.round((s.progress.current/s.progress.target)*100)) : 0;
  return `
  <div class="seed-card ${s.state==='active'?'active-seed':'dormant-seed'}" data-id="${s.id}">
    <div class="seed-row">
      <div class="firefly"></div>
      <div class="seed-title">${esc(s.title)}</div>
      <div class="seed-meta">
        ${s.root!=='none'?`<div class="root-dot" style="background:${dot}"></div>`:''}
        ${kids?`<div class="children-hint">${kids} ›</div>`:''}
      </div>
    </div>
    ${s.notes?`<div class="seed-notes">${esc(s.notes)}</div>`:''}
    ${s.progress?`
    <div class="progress-row">
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-label">${s.progress.current} / ${s.progress.target} ${esc(s.progress.unit||'')}</div>
      <button class="plus-btn" data-pid="${s.id}" onclick="incrementProgress(event,'${s.id}')">+</button>
    </div>`:''}
  </div>`;
}

function attachSeedGestures() {
  document.querySelectorAll('.seed-card').forEach(card => {
    const id = card.dataset.id;
    let taps = 0, tapT = null, holdT = null, held = false;
    card.addEventListener('pointerdown', () => {
      held = false;
      holdT = setTimeout(() => {
        held = true;
        card.classList.add('completing');
        toggleSeedState(id);
        setTimeout(() => { card.classList.remove('completing'); render(); }, 350);
      }, 500);
    });
    card.addEventListener('pointerup', () => {
      clearTimeout(holdT);
      if (held) return;
      taps++;
      if (taps === 1) {
        tapT = setTimeout(() => {
          taps = 0;
          openSheet(id, 'seeds');
        }, 300);
      } else if (taps >= 2) {
        clearTimeout(tapT);
        taps = 0;
        const kids = db.seeds.filter(x => x.parentId === id).length;
        if (kids > 0) drillSeed(id);
        else openSheet(id, 'seeds');
      }
    });
    card.addEventListener('pointerleave', () => clearTimeout(holdT));
    card.addEventListener('pointercancel', () => clearTimeout(holdT));
  });
}

function toggleSeedState(id) {
  const s = db.seeds.find(x => x.id === id);
  if (s) { s.state = s.state === 'active' ? 'dormant' : 'active'; persist(); }
}

function drillSeed(id) {
  navStack.push(currentParentId);
  currentParentId = id;
  render();
  document.getElementById('seedList').scrollTop = 0;
}

function navigateUp() {
  if (currentTab === 'projects' && currentProjectId) {
    saveProjectEditor();
    currentProjectId = null;
    document.getElementById('projectEditor').classList.remove('open');
    document.getElementById('projectsList').style.display = '';
    document.getElementById('tabs').style.display = '';
    updateHeader();
    renderProjects();
    return;
  }
  currentParentId = navStack.pop() ?? null;
  render();
}

function editCurrentSeed() {
  if (currentParentId) openSheet(currentParentId);
}

function incrementProgress(e, id) {
  e.stopPropagation();
  const s = db.seeds.find(x => x.id === id);
  if (s?.progress) {
    s.progress.current = Math.min(s.progress.target, s.progress.current + 1);
    persist();
    render();
  }
}


// TASKS
function renderTasks() {
  const list = document.getElementById('taskList');
  if (!db.tasks.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">✓</div><p>No tasks yet.<br>Add something quick.</p></div>`;
    return;
  }
  const active = db.tasks.filter(t => !t.done);
  const done = db.tasks.filter(t => t.done);
  let html = '';
  if (active.length) html += `<div class="section-label">To do</div>`;
  active.forEach(t => html += taskCardHTML(t));
  if (done.length) html += `<div class="section-label">Done</div>`;
  done.forEach(t => html += taskCardHTML(t));
  list.innerHTML = html;
  attachTaskGestures();
}

function taskCardHTML(t) {
  const dot = ROOT_COLORS[t.root] || ROOT_COLORS.none;
  const pct = t.progress ? Math.min(100, Math.round((t.progress.current/t.progress.target)*100)) : 0;
  return `
  <div class="task-card ${!t.done ? 'task-active' : ''}" data-id="${t.id}" style="${t.done ? 'opacity:0.45' : ''}">
    <div class="task-check" data-id="${t.id}">
      <svg viewBox="0 0 12 12" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="opacity:${t.done?1:0}">
        <polyline points="1.5 6 4.5 9 10.5 3"/>
      </svg>
    </div>
    <div class="task-title" style="${t.done ? 'text-decoration:line-through;color:var(--text-muted)' : ''}">${esc(t.title)}</div>
    <div class="seed-meta">
      ${t.root && t.root !== 'none' ? `<div class="root-dot" style="background:${dot}"></div>` : ''}
    </div>
  </div>
  ${t.progress ? `
  <div class="progress-row" style="padding: 0 15px 10px;margin-top:-4px;">
    <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="progress-label">${t.progress.current} / ${t.progress.target} ${esc(t.progress.unit||'')}</div>
    <button class="plus-btn" onclick="incrementTask(event,'${t.id}')">+</button>
  </div>` : ''}`;
}

function attachTaskGestures() {
  document.querySelectorAll('.task-card').forEach(card => {
    const id = card.dataset.id;
    let holdT = null, held = false;
    card.addEventListener('pointerdown', () => {
      held = false;
      holdT = setTimeout(() => {
        held = true;
        openSheet(id, 'tasks');
      }, 500);
    });
    card.addEventListener('pointerup', () => {
      clearTimeout(holdT);
      if (held) return;
      completeTask(id, card);
    });
    card.addEventListener('pointerleave', () => clearTimeout(holdT));
    card.addEventListener('pointercancel', () => clearTimeout(holdT));
  });
}

function completeTask(id, card) {
  const t = db.tasks.find(x => x.id === id);
  if (!t) return;
  if (t.done) {
    // tap a done task to un-complete it
    t.done = false;
    persist();
    render();
    return;
  }
  // animate out then mark done
  card.classList.add('completing');
  setTimeout(() => {
    t.done = true;
    persist();
    render();
  }, 500);
}

function incrementTask(e, id) {
  e.stopPropagation();
  const t = db.tasks.find(x => x.id === id);
  if (t?.progress) { t.progress.current = Math.min(t.progress.target, t.progress.current + 1); persist(); render(); }
}

// PATHS
function renderPaths() {
  const list = document.getElementById('pathsList');
  const steps = db.paths;
  if (!steps.length) {
    list.innerHTML = `<div class="path-empty"><div style="font-size:32px;opacity:0.3">🛤️</div><p>No steps yet.<br>Add the first one.</p></div>`;
    return;
  }
  let html = '';
  steps.forEach((s, i) => {
    const dot = ROOT_COLORS[s.root] || ROOT_COLORS.none;
    const pct = s.progress ? Math.min(100, Math.round((s.progress.current/s.progress.target)*100)) : 0;
    html += `
    <div class="path-step" data-id="${s.id}">
      <div class="path-card ${s.state==='active'?'active-seed':'dormant-seed'}">
        <div class="seed-row">
          <div class="firefly"></div>
          <div class="seed-title">${esc(s.title)}</div>
          ${s.root!=='none'?`<div class="root-dot" style="background:${dot}"></div>`:''}
        </div>
        ${s.progress?`
        <div class="progress-row">
          <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
          <div class="progress-label">${s.progress.current}/${s.progress.target}${s.progress.unit?' '+esc(s.progress.unit):''}</div>
          <button class="plus-btn" onclick="incrementPath(event,'${s.id}')">+</button>
        </div>`:''}
        <div class="path-reorder">
          ${i > 0 ? `<button class="reorder-btn" onclick="moveStep(event,'${s.id}',-1)">‹</button>` : '<span></span>'}
          ${i < steps.length - 1 ? `<button class="reorder-btn" onclick="moveStep(event,'${s.id}',1)">›</button>` : '<span></span>'}
        </div>
      </div>
    </div>
    ${i < steps.length - 1 ? `<div class="path-connector">›</div>` : ''}`;
  });
  if (db.pathGoal) {
    html += `<div class="path-connector">›</div>
    <div class="path-goal">
      <div class="goal-card">
        <div class="goal-flag">🎯</div>
        <div class="goal-title">${esc(db.pathGoal)}</div>
      </div>
    </div>`;
  }
  list.innerHTML = html;
  attachPathGestures();
}

function attachPathGestures() {
  document.querySelectorAll('.path-step').forEach(card => {
    const id = card.dataset.id;
    let holdT = null, held = false;
    card.addEventListener('pointerdown', () => {
      held = false;
      holdT = setTimeout(() => { held = true; openSheet(id, 'path'); }, 500);
    });
    card.addEventListener('pointerup', () => { clearTimeout(holdT); });
    card.addEventListener('pointerleave', () => clearTimeout(holdT));
  });
}

function incrementPath(e, id) {
  e.stopPropagation();
  const s = db.paths.find(x => x.id === id);
  if (s?.progress) { s.progress.current = Math.min(s.progress.target, s.progress.current + 1); persist(); render(); }
}

function moveStep(e, id, dir) {
  e.stopPropagation();
  const idx = db.paths.findIndex(x => x.id === id);
  if (idx === -1) return;
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= db.paths.length) return;
  const tmp = db.paths[idx];
  db.paths[idx] = db.paths[newIdx];
  db.paths[newIdx] = tmp;
  persist();
  render();
  // keep scroll position roughly on the moved card
  setTimeout(() => {
    const el = document.querySelector(`.path-step[data-id="${id}"]`);
    if (el) el.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  }, 50);
}

// PROJECTS
function renderProjects() {
  const list = document.getElementById('projectsList');
  if (!db.projects.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">📖</div><p>No projects yet.<br>Start your first one.</p></div>`;
    return;
  }
  let html = '';
  db.projects.forEach(p => {
    html += `
    <div class="project-card" onclick="openProject('${p.id}')">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;">
        <div class="project-title">${esc(p.title||'Untitled')}</div>
        <button onclick="event.stopPropagation();openSheet('${p.id}','projects')" style="background:none;border:none;color:var(--text-dim);font-size:12px;cursor:pointer;padding:2px 4px;flex-shrink:0;font-family:inherit;">Edit</button>
      </div>
      ${p.body?`<div class="project-preview">${esc(p.body)}</div>`:''}
      <div class="project-meta">
        ${p.root&&p.root!=='none'?`<div class="root-dot" style="background:${ROOT_COLORS[p.root]}"></div>`:''}
        <div style="font-size:11px;color:var(--text-dim)">${new Date(p.updatedAt||p.createdAt).toLocaleDateString()}</div>
      </div>
    </div>`;
  });
  list.innerHTML = html;
}

function openProject(id) {
  const p = db.projects.find(x => x.id === id);
  if (!p) return;
  currentProjectId = id;
  document.getElementById('editorTitle').value = p.title || '';
  document.getElementById('editorBody').value = p.body || '';
  document.getElementById('projectsList').style.display = 'none';
  document.getElementById('tabs').style.display = 'none';
  document.getElementById('projectEditor').classList.add('open');
  updateHeader();

  // autosave on input
  const autoSave = () => {
    clearTimeout(projectSaveTimer);
    projectSaveTimer = setTimeout(saveProjectEditor, 800);
  };
  document.getElementById('editorTitle').oninput = autoSave;
  document.getElementById('editorBody').oninput = autoSave;
}

function saveProjectEditor() {
  if (!currentProjectId) return;
  const p = db.projects.find(x => x.id === currentProjectId);
  if (!p) return;
  p.title = document.getElementById('editorTitle').value.trim() || 'Untitled';
  p.body = document.getElementById('editorBody').value;
  p.updatedAt = Date.now();
  persist();
}

// ── SHEET ──
function openSheet(editId = null, type = null) {
  editingType = type || currentTab;
  editingId = editId;
  selRoot = 'none'; selState = 'active'; progressOn = false;

  // show/hide notes for tasks
  const notesSection = document.getElementById('notesSection');
  const rootSection = document.getElementById('rootSection');
  const progressSection = document.getElementById('progressSection');
  notesSection.style.display = (editingType === 'tasks') ? 'none' : '';
  rootSection.style.display = '';
  progressSection.style.display = editingType === 'projects' ? 'none' : '';

  let sheetTitles = { seeds: 'Plant a seed', paths: 'Add a step', projects: 'New project', path: 'Edit step' };
  document.getElementById('sheetTitle').textContent = editId ? 'Edit' : (sheetTitles[editingType] || 'New');

  if (editId) {
    const arr = editingType === 'tasks' ? db.tasks : (editingType === 'path' || editingType === 'paths') ? db.paths : (editingType === 'projects' ? db.projects : db.seeds);
    const item = arr.find(x => x.id === editId);
    if (item) {
      document.getElementById('titleInput').value = item.title || '';
      document.getElementById('notesInput').value = item.notes || '';
      selRoot = item.root || 'none';
      selState = item.state || 'active';
      if (item.progress) {
        progressOn = true;
        document.getElementById('progressCurrent').value = item.progress.current;
        document.getElementById('progressTarget').value = item.progress.target;
        document.getElementById('progressUnit').value = item.progress.unit || '';
      }
    }
    document.getElementById('deleteBtn').style.display = '';
  } else {
    document.getElementById('titleInput').value = '';
    document.getElementById('notesInput').value = '';
    document.getElementById('progressCurrent').value = '';
    document.getElementById('progressTarget').value = '';
    document.getElementById('progressUnit').value = 'hrs';
    document.getElementById('deleteBtn').style.display = 'none';
    progressOn = false;
  }

  document.querySelectorAll('.dot-opt').forEach(o => o.classList.toggle('sel', o.dataset.root === selRoot));
  updateStateUI();
  updateProgressUI();

  document.getElementById('overlay').classList.add('open');
  document.getElementById('sheet').classList.add('open');
  setTimeout(() => document.getElementById('titleInput').focus(), 80);
}

function closeSheet() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
  editingId = null;
}

function selectRoot(el) {
  selRoot = el.dataset.root;
  document.querySelectorAll('.dot-opt').forEach(o => o.classList.toggle('sel', o.dataset.root === selRoot));
}

function selectState(s) {
  selState = s;
  updateStateUI();
}

function updateStateUI() {
  document.getElementById('stateActive').className = 'state-btn' + (selState === 'active' ? ' s-active' : '');
  document.getElementById('stateDormant').className = 'state-btn' + (selState === 'dormant' ? ' s-dormant' : '');
}

function toggleProgress() {
  progressOn = !progressOn;
  updateProgressUI();
}

function updateProgressUI() {
  document.getElementById('progressToggle').classList.toggle('on', progressOn);
  document.getElementById('progressFields').classList.toggle('visible', progressOn);
}

function saveSeed() {
  const title = document.getElementById('titleInput').value.trim();
  if (!title) { document.getElementById('titleInput').focus(); return; }

  const progress = progressOn ? {
    current: parseInt(document.getElementById('progressCurrent').value) || 0,
    target: parseInt(document.getElementById('progressTarget').value) || 1,
    unit: document.getElementById('progressUnit').value.trim() || 'hrs'
  } : null;

  if (editingType === 'tasks') {
    if (editingId) {
      const t = db.tasks.find(x => x.id === editingId);
      if (t) { t.title = title; t.root = selRoot; t.progress = progress; }
    } else {
      db.tasks.push({ id: uid(), title, root: selRoot, done: false, progress, createdAt: Date.now() });
    }
    persist(); closeSheet(); render();
    return;
  }
  if (editingType === 'paths' || editingType === 'path') {
    if (editingId) {
      const s = db.paths.find(x => x.id === editingId);
      if (s) { s.title = title; s.root = selRoot; s.state = selState; s.progress = progress; }
    } else {
      db.paths.push({ id: uid(), title, root: selRoot, state: selState, progress, createdAt: Date.now() });
    }
  } else if (editingType === 'projects') {
    if (editingId) {
      const p = db.projects.find(x => x.id === editingId);
      if (p) { p.title = title; p.root = selRoot; }
    } else {
      const p = { id: uid(), title, root: selRoot, body: '', createdAt: Date.now() };
      db.projects.push(p);
      persist(); closeSheet(); render();
      setTimeout(() => openProject(p.id), 50);
      return;
    }
  } else {
    if (editingId) {
      const s = db.seeds.find(x => x.id === editingId);
      if (s) { s.title = title; s.notes = document.getElementById('notesInput').value.trim(); s.root = selRoot; s.state = selState; s.progress = progress; }
    } else {
      db.seeds.push({ id: uid(), title, notes: document.getElementById('notesInput').value.trim(), parentId: currentParentId, root: selRoot, state: selState, progress, createdAt: Date.now() });
    }
  }

  persist(); closeSheet(); render();
}

function deleteSeed() {
  if (!editingId) return;
  if (editingType === 'tasks') {
    db.tasks = db.tasks.filter(x => x.id !== editingId);
  } else if (editingType === 'paths' || editingType === 'path') {
    db.paths = db.paths.filter(x => x.id !== editingId);
  } else if (editingType === 'projects') {
    db.projects = db.projects.filter(x => x.id !== editingId);
  } else {
    function removeTree(id) {
      db.seeds.filter(x => x.parentId === id).forEach(c => removeTree(c.id));
      db.seeds = db.seeds.filter(x => x.id !== id);
    }
    removeTree(editingId);
    if (currentParentId === editingId) { currentParentId = navStack.pop() ?? null; }
  }
  persist(); closeSheet(); render();
}

// ── EXPORT / IMPORT ──
function toggleMenu() {
  const m = document.getElementById('overflowMenu');
  m.style.display = m.style.display === 'none' ? 'block' : 'none';
}

document.addEventListener('click', e => {
  const menu = document.getElementById('overflowMenu');
  const btn = document.getElementById('menuBtn');
  if (menu && btn && !menu.contains(e.target) && !btn.contains(e.target)) {
    menu.style.display = 'none';
  }
});

function exportData() {
  document.getElementById('overflowMenu').style.display = 'none';
  const blob = new Blob([JSON.stringify(db, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'forest-backup-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function importData(e) {
  document.getElementById('overflowMenu').style.display = 'none';
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const imported = JSON.parse(ev.target.result);
      if (!imported.seeds || !imported.paths || !imported.projects) {
        alert('This file does not look like a Forest backup.');
        return;
      }
      if (confirm('This will replace your current Forest data. Continue?')) {
        db = imported;
        persist();
        render();
      }
    } catch {
      alert('Could not read that file.');
    }
    e.target.value = '';
  };
  reader.readAsText(file);
}

// ── GOAL SHEET ──
function openGoalSheet() {
  const current = db.pathGoal || '';
  const val = prompt('What is the final goal of this path?', current);
  if (val === null) return; // cancelled
  db.pathGoal = val.trim();
  persist();
  render();
}

// ── INIT ──
render();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));
}
</script>
